<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fabrizio</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    .container {
      max-width: 600px;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 10px;
    }

    p {
      font-size: 1.2rem;
      margin-bottom: 25px;
      color: #cbd5f5;
    }

    a {
      display: inline-block;
      padding: 12px 24px;
      background: #3b82f6;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
      transition: 0.3s;
    }

    a:hover {
      background: #2563eb;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Hi there, I'm Fabrizio</h1>
    <p>My resume is now available on my personal website</p>
    <a href="https://fabriziogamboa.com" target="_blank">
      Visit fabriziogamboa.com
    </a>
  </div>
</body>
</html>
